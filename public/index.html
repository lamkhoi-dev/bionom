<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sê Pan Nhan</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- Overlay hướng dẫn mở trong trình duyệt (chỉ hiện trong TikTok in-app browser) -->
  <div id="iab-overlay" class="iab-overlay" style="display:none">
    <div class="iab-content">
      <div class="iab-arrow">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fe2c55" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 19V5M5 12l7-7 7 7"/>
        </svg>
      </div>
      <div class="iab-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round">
          <circle cx="12" cy="5" r="1" fill="#fff"/>
          <circle cx="12" cy="12" r="1" fill="#fff"/>
          <circle cx="12" cy="19" r="1" fill="#fff"/>
        </svg>
      </div>
      <h2>Mở trong trình duyệt</h2>
      <p>Bấm <strong>⋮</strong> hoặc <strong>⋯</strong> ở góc trên bên phải, sau đó chọn <strong>"Mở trong trình duyệt"</strong></p>
      <div class="iab-steps">
        <div class="iab-step">
          <span class="step-num">1</span>
          <span>Bấm <strong>⋮</strong> phía trên</span>
        </div>
        <div class="iab-step">
          <span class="step-num">2</span>
          <span>Chọn <strong>"Mở trong trình duyệt"</strong></span>
        </div>
      </div>
      <button id="iab-copy" class="iab-copy-btn">Hoặc bấm để copy link</button>
      <p class="iab-hint">Rồi dán vào trình duyệt Chrome / Safari</p>
    </div>
  </div>

  <!-- Bio page chính -->
  <div class="container">
    <div class="profile">
      <div class="avatar">
        <div class="avatar-placeholder">S</div>
      </div>
      <h1 class="name">Sê Pan Nhan</h1>
      <p class="bio">Theo dõi mình trên các nền tảng</p>
    </div>

    <div class="links">
      <a href="/go/facebook" class="link-btn facebook">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        <span>Facebook</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </a>
    </div>

    <footer class="footer">
      <p>&copy; 2026 Sê Pan Nhan</p>
    </footer>
  </div>

  <script>
  (function() {
    var ua = navigator.userAgent || '';
    var isTikTok = /musical_ly|tiktok|bytedance/i.test(ua);

    if (!isTikTok) return;

    // Hiện overlay hướng dẫn
    var overlay = document.getElementById('iab-overlay');
    overlay.style.display = 'flex';

    // Copy link button
    var copyBtn = document.getElementById('iab-copy');
    copyBtn.addEventListener('click', function() {
      var url = window.location.href;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function() {
          copyBtn.textContent = 'Đã copy link!';
          copyBtn.style.background = '#25f4ee';
          copyBtn.style.color = '#000';
        });
      } else {
        // Fallback cho WebView cũ
        var input = document.createElement('input');
        input.value = url;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        copyBtn.textContent = 'Đã copy link!';
        copyBtn.style.background = '#25f4ee';
        copyBtn.style.color = '#000';
      }
    });
  })();
  </script>
</body>
</html>
